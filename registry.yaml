version: "2.1"
updated: "2026-02-22"
description: "Free LLM API Providers Registry - Truly free providers with no payment required"

# Inclusion criteria:
# - No payment method required
# - Recurring limits (auto-refill)
# - API access available
# - Currently active

providers:
  - id: "cerebras"
    name: "Cerebras"
    free: true
    rateLimited: true
    models: 4
    protocol: "openai"
    file: "providers/cloud/cerebras/config.yaml"

  - id: "cloudflare"
    name: "Cloudflare Workers AI"
    free: true
    rateLimited: true
    models: 60
    protocol: "cloudflare"
    file: "providers/cloud/cloudflare/config.yaml"

  - id: "gemini"
    name: "Google AI Studio (Gemini)"
    free: true
    rateLimited: true
    models: 8
    protocol: "gemini"
    file: "providers/cloud/gemini/config.yaml"

  - id: "github-models"
    name: "GitHub Models"
    free: true
    rateLimited: true
    models: 41
    protocol: "openai"
    file: "providers/cloud/github-models/config.yaml"

  - id: "groq"
    name: "Groq"
    free: true
    rateLimited: true
    models: 12
    protocol: "openai"
    file: "providers/cloud/groq/config.yaml"

  - id: "huggingface"
    name: "HuggingFace Inference API"
    free: true
    rateLimited: true
    models: 25
    protocol: "openai"
    file: "providers/cloud/huggingface/config.yaml"

  - id: "mistral"
    name: "Mistral"
    free: true
    rateLimited: true
    models: 8
    protocol: "openai"
    file: "providers/cloud/mistral/config.yaml"

  - id: "nvidia-nim"
    name: "NVIDIA NIM"
    free: true
    rateLimited: true
    models: 120
    protocol: "openai"
    file: "providers/cloud/nvidia-nim/config.yaml"

  - id: "ollama-cloud"
    name: "Ollama Cloud"
    free: true
    rateLimited: true
    models: 32
    protocol: "ollama"
    file: "providers/cloud/ollama-cloud/config.yaml"

  - id: "openrouter"
    name: "OpenRouter"
    free: true
    rateLimited: true
    models: 26
    protocol: "openai"
    file: "providers/cloud/openrouter/config.yaml"

  - id: "vercel-ai"
    name: "Vercel AI Gateway"
    free: true
    rateLimited: true
    models: 1
    protocol: "openai"
    file: "providers/cloud/vercel-ai/config.yaml"

# Excluded providers (documented in providers/cloud/{name}/README.md):
excluded:
  - id: "coze"
    reason: "Outdated model list"
    file: "providers/cloud/coze/README.md"
  
  - id: "together"
    reason: "Requires $5 minimum deposit"
  
  - id: "deepseek"
    reason: "Temporarily unavailable - sign-ups paused"

modalities:
  text-to-text:
    description: "Text input, text output"
    examples: ["GPT-4", "Llama", "Claude"]
  
  image-to-text:
    description: "Image input, text output (vision)"
    examples: ["GPT-4o", "Gemini Vision", "Llava"]
  
  text-to-image:
    description: "Text input, image output"
    examples: ["Stable Diffusion", "Flux", "DALL-E"]
  
  text-to-audio:
    description: "Text input, audio output"
    examples: ["TTS models", "Bark"]
  
  audio-to-text:
    description: "Audio input, text output"
    examples: ["Whisper"]
  
  text-to-embedding:
    description: "Text input, vector output"
    examples: ["text-embedding-3", "BGE"]

protocols:
  openai:
    description: "OpenAI-compatible /v1/chat/completions"
    auth: "Bearer token"
  
  ollama:
    description: "Ollama /api/chat format"
    auth: "Bearer token"
  
  gemini:
    description: "Google Gemini generateContent API"
    auth: "Query parameter ?key="
  
  cloudflare:
    description: "Cloudflare Workers AI format"
    auth: "Bearer token"
