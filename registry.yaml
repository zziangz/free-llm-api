modalities:
  text-to-text:
    description: "Text input, text output"
    examples: ["GPT-4", "Llama", "Claude"]
  
  text-image-to-text:
    description: "Text and image input, text output"
    examples: ["GPT-4o", "Gemini Pro Vision", "Claude 3"]
  
  image-to-text:
    description: "Image input, text output"
    examples: ["BLIP", "LLaVA"]
  
  text-to-image:
    description: "Text input, image output"
    examples: ["Stable Diffusion", "Flux", "DALL-E"]
  
  image-to-image:
    description: "Image input, image output"
    examples: ["SD img2img", "ControlNet"]
  
  text-to-audio:
    description: "Text input, audio output"
    examples: ["TTS models", "Bark"]
  
  audio-to-text:
    description: "Audio input, text output"
    examples: ["Whisper"]
  
  text-to-embedding:
    description: "Text input, vector output"
    examples: ["text-embedding-3", "BGE"]
  
  text-to-video:
    description: "Text input, video output"
    examples: ["Sora", "Runway"]
  
  video-to-text:
    description: "Video input, text output"
    examples: ["Video understanding models"]
