$id: "local-vllm"
name: "vLLM"
description: "High-throughput LLM serving engine"
url: "https://vllm.readthedocs.io"
docs: "https://vllm.readthedocs.io/en/latest/"

auth:
  type: "none"

endpoint:
  baseUrl: "http://localhost:8000"
  protocol: "openai"

limits: {}

models:
  - id: "auto"
    upstream: "auto"
    free: true
    modalities:
      - text-to-text
    contextWindow: 8192
    capabilities:
      streaming: true
      tools: false
      vision: false
      json: false

status: "active"
tags:
  - local
  - free
  - unlimited
  - high-throughput
