$id: "hyperbolic"
name: "Hyperbolic"
description: "Decentralized compute for AI inference"
url: "https://hyperbolic.xyz"
docs: "https://docs.hyperbolic.xyz"

auth:
  type: "bearer"
  keyLabel: "Hyperbolic API Key"
  keyUrl: "https://app.hyperbolic.xyz/"

endpoint:
  baseUrl: "https://api.hyperbolic.xyz/v1"
  protocol: "openai"

limits: {}

models:
  - id: "llama-3.3-70b-instruct"
    upstream: "meta-llama/Llama-3.3-70B-Instruct"
    free: false
    modalities:
      - text-to-text
    contextWindow: 131072
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

  - id: "deepseek-v3"
    upstream: "deepseek-ai/DeepSeek-V3"
    free: false
    modalities:
      - text-to-text
    contextWindow: 128000
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

status: "active"
tags:
  - credit-based
  - decentralized
