$id: "nebius"
name: "Nebius"
description: "Cloud platform for AI workloads"
url: "https://nebius.com"
docs: "https://docs.nebius.com"

auth:
  type: "bearer"
  keyLabel: "Nebius API Key"
  keyUrl: "https://studio.nebius.com/"

endpoint:
  baseUrl: "https://api.studio.nebius.ai/v1"
  protocol: "openai"

limits: {}

models:
  - id: "llama-3.3-70b-instruct"
    upstream: "meta-llama/Meta-Llama-3.3-70B-Instruct"
    free: false
    modalities:
      - text-to-text
    contextWindow: 131072
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

status: "active"
tags:
  - credit-based
