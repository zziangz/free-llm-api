$id: "groq"
name: "Groq"
description: "Ultra-fast inference with LPU technology"
url: "https://groq.com"
docs: "https://console.groq.com/docs"

auth:
  type: "bearer"
  keyLabel: "Groq API Key"
  keyUrl: "https://console.groq.com/keys"
  keyPrefix: "gsk_"

endpoint:
  baseUrl: "https://api.groq.com/openai/v1"
  protocol: "openai"

limits:
  requestsPerMinute: 30
  tokensPerMinute: 18000

models:
  - id: "llama-3.3-70b-versatile"
    upstream: "llama-3.3-70b-versatile"
    free: true
    modalities:
      - text-to-text
    contextWindow: 128000
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

  - id: "llama-3.1-8b-instant"
    upstream: "llama-3.1-8b-instant"
    free: true
    modalities:
      - text-to-text
    contextWindow: 128000
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

  - id: "mixtral-8x7b"
    upstream: "mixtral-8x7b-32768"
    free: true
    modalities:
      - text-to-text
    contextWindow: 32768
    maxOutputTokens: 4096
    capabilities:
      streaming: true
      tools: false
      vision: false
      json: false

status: "active"
env: "GROQ_API_KEY"
tags:
  - free
  - fast
