$id: "cerebras"
name: "Cerebras"
description: "Fast inference with Wafer Scale Engine"
url: "https://cerebras.ai"
docs: "https://cloud.cerebras.ai/platform/docs"

auth:
  type: "bearer"
  keyLabel: "Cerebras API Key"
  keyUrl: "https://cloud.cerebras.ai/platform/"
  keyPrefix: "csj-"

endpoint:
  baseUrl: "https://api.cerebras.ai/v1"
  protocol: "openai"

limits:
  requestsPerMinute: 30
  tokensPerMinute: 60000
  tokensPerDay: 1000000

models:
  - id: "llama-3.3-70b"
    upstream: "llama-3.3-70b"
    free: true
    modalities:
      - text-to-text
    contextWindow: 128000
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

  - id: "llama-3.1-8b"
    upstream: "llama-3.1-8b"
    free: true
    modalities:
      - text-to-text
    contextWindow: 128000
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

status: "active"
env: "CEREBRAS_API_KEY"
tags:
  - free
  - fast
