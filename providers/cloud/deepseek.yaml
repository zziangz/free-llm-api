$id: "deepseek"
name: "DeepSeek"
description: "Advanced reasoning models with competitive pricing"
url: "https://deepseek.com"
docs: "https://platform.deepseek.com/docs"

auth:
  type: "bearer"
  keyLabel: "DeepSeek API Key"
  keyUrl: "https://platform.deepseek.com/api_keys"

endpoint:
  baseUrl: "https://api.deepseek.com"
  protocol: "openai"

limits:
  requestsPerMinute: 60

models:
  - id: "deepseek-chat"
    upstream: "deepseek-chat"
    free: true
    modalities:
      - text-to-text
    contextWindow: 64000
    maxOutputTokens: 4096
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

  - id: "deepseek-reasoner"
    upstream: "deepseek-reasoner"
    free: true
    modalities:
      - text-to-text
    contextWindow: 64000
    maxOutputTokens: 4096
    capabilities:
      streaming: true
      tools: false
      vision: false
      json: false

status: "active"
env: "DEEPSEEK_API_KEY"
tags:
  - free-tier
  - reasoning
