$id: "huggingface"
name: "HuggingFace Inference Router"
description: "Unified gateway to 15+ inference providers through HuggingFace Hub"
url: "https://huggingface.co"
docs: "https://huggingface.co/docs/api-inference/index"

auth:
  type: "bearer"
  keyLabel: "HuggingFace Token"
  keyUrl: "https://huggingface.co/settings/tokens"

# HuggingFace Router is OpenAI-compatible
endpoint:
  baseUrl: "https://router.huggingface.co/v1"
  protocol: "openai"

# Free tier is very limited - $0.10/month
# Consider using dedicated free providers (Cerebras, Groq, etc.)
limits:
  credits:
    monthly: 0.1
    description: "Free tier: $0.10/month credits, then pay-as-you-go"

# Available inference providers through this router
providers:
  - cerebras
  - cohere
  - featherless-ai
  - fireworks-ai
  - groq
  - hf-inference
  - hyperbolic
  - novita
  - nscale
  - ovhcloud
  - publicai
  - sambanova
  - scaleway
  - together
  - zai-org

