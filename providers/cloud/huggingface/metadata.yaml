# HuggingFace Inference Router Metadata
# https://huggingface.co/docs/api-inference/index
# Last updated: 2026-02-22
#
# HuggingFace Router is a unified gateway to multiple inference providers
# The API auto-reports capabilities - this file contains curated notes

# Available inference providers through the router
providers:
  # Free/credited providers (we have separate configs for these)
  - cerebras
  - groq
  - sambanova
  - hyperbolic
  
  # HuggingFace's own inference (very limited: $0.10/month free)
  - hf-inference
  
  # Paid providers
  - novita
  - together
  - fireworks-ai
  - cohere
  - featherless-ai
  - nscale
  - ovhcloud
  - publicai
  - scaleway

# HuggingFace's own inference models (hf-inference provider)
# These are the only truly "free" models on HF's own infrastructure
hf_inference_models:
  - "HuggingFaceTB/SmolLM3-3B"
  - "katanemo/Arch-Router-1.5B"

# Free tier limitations
free_tier:
  monthly_credits: 0.10  # USD per month
  description: "Very limited - $0.10/month free credits, then pay-as-you-go"
  recommendation: "Use dedicated providers (Cerebras, Groq, etc.) for free usage"

# Models with vision capability (from API input_modalities)
# These include 'image' in input_modalities
vision_models:
  - "Qwen/Qwen3.5-397B-A17B"
  - "moonshotai/Kimi-K2.5"
  - "Qwen/Qwen2.5-VL-72B-Instruct"
  - "Qwen/Qwen2.5-VL-7B-Instruct"
  - "meta-llama/Llama-3.2-11B-Vision-Instruct"
  - "meta-llama/Llama-3.2-90B-Vision-Instruct"
  - "mistralai/Pixtral-12B-2409"
  - "mistralai/Pixtral-Large-Instruct-2411"

# Models with tool/function calling (from API supports_tools)
# List maintained automatically from API

# Context windows (from API context_length)
# List maintained automatically from API

# Recommended models for different use cases
recommendations:
  # Best free options (route through free providers)
  free_chat:
    model: "meta-llama/Llama-3.3-70B-Instruct"
    via: ["groq", "cerebras", "sambanova"]
    
  free_vision:
    model: "meta-llama/Llama-3.2-11B-Vision-Instruct"
    via: ["groq"]
    
  free_coding:
    model: "Qwen/Qwen2.5-Coder-32B-Instruct"
    via: ["groq", "sambanova"]
  
  # Best paid options
  flagship:
    model: "Qwen/Qwen3.5-397B-A17B"
    via: ["novita", "together"]

# Model aliases for convenience
aliases:
  "llama-70b": "meta-llama/Llama-3.3-70B-Instruct"
  "qwen-coder": "Qwen/Qwen2.5-Coder-32B-Instruct"
  "llama-vision": "meta-llama/Llama-3.2-11B-Vision-Instruct"

# Deprecated/removed models
deprecated_models: []

# Default settings
defaults:
  contextWindow: 32768
  maxOutputTokens: 4096
