$id: "gemini"
name: "Google AI Studio (Gemini)"
description: "Google's Gemini models with massive context windows and multimodal support"
url: "https://aistudio.google.com"
docs: "https://ai.google.dev/docs"

auth:
  type: "query"
  keyLabel: "Google AI API Key"
  keyUrl: "https://aistudio.google.com/api-keys"
  keyParam: "key"

# Gemini uses custom protocol (NOT OpenAI-compatible)
# Use adapter.py for OpenAI compatibility or Google's SDK
endpoint:
  baseUrl: "https://generativelanguage.googleapis.com/v1beta"
  protocol: "gemini"

# No global rate limits - each model has its own limits
# See per-model limits below

models:
  - id: "gemini-2.5-flash"
    upstream: "gemini-2.5-flash"
    free: true
    modalities:
      - text-to-text
      - image-to-text
    contextWindow: 1048576
    maxOutputTokens: 65536
    limits:
      requests:
        perMinute: 5
        perDay: 20
      tokens:
        perMinute: 250000
    capabilities:
      streaming: true
      tools: true
      vision: true
      json: true
      thinking: true

  - id: "gemini-2.5-flash-lite"
    upstream: "gemini-2.5-flash-lite"
    free: true
    modalities:
      - text-to-text
      - image-to-text
    contextWindow: 1048576
    maxOutputTokens: 65536
    limits:
      requests:
        perMinute: 10
        perDay: 20
      tokens:
        perMinute: 250000
    capabilities:
      streaming: true
      tools: true
      vision: true
      json: true
      thinking: true

  - id: "gemini-3-flash-preview"
