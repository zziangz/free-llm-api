$id: "google-ai-studio"
name: "Google AI Studio"
description: "Free tier for Gemini models with generous context windows"
url: "https://aistudio.google.com"
docs: "https://ai.google.dev/docs"

auth:
  type: "query"
  keyLabel: "Google AI API Key"
  keyUrl: "https://aistudio.google.com/api-keys"
  keyParam: "key"

endpoint:
  baseUrl: "https://generativelanguage.googleapis.com/v1beta"
  protocol: "gemini"

limits:
  requestsPerMinute: 15
  tokensPerMinute: 1000000
  tokensPerDay: 32000

models:
  - id: "gemini-2.0-flash-exp"
    upstream: "gemini-2.0-flash-exp"
    free: true
    modalities:
      - text-to-text
      - text-image-to-text
    contextWindow: 1048576
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: true
      json: true

  - id: "gemini-1.5-flash"
    upstream: "gemini-1.5-flash"
    free: true
    modalities:
      - text-to-text
      - text-image-to-text
    contextWindow: 1000000
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: true
      json: true

  - id: "gemini-1.5-flash-8b"
    upstream: "gemini-1.5-flash-8b"
    free: true
    modalities:
      - text-to-text
      - text-image-to-text
    contextWindow: 1000000
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: true
      json: true

status: "active"
env: "GEMINI_API_KEY"
tags:
  - free
  - rate-limited
