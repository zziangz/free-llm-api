$id: github-models
name: GitHub Models
description: Free tier for GitHub users with access to popular models via Azure AI
url: https://github.com/marketplace/models
docs: https://docs.github.com/en/github-models
auth:
  type: bearer
  keyLabel: GitHub Personal Access Token
  keyUrl: https://github.com/settings/personal-access-tokens/new
  keyPrefix: ghp_
endpoint:
  baseUrl: https://models.github.ai/inference
  protocol: openai
limits:
  requests:
    perMinute: 60
  tokens:
    perDay: 100000
  concurrent: 5
models:
