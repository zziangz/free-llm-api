# Cloudflare Workers AI Model Metadata
# Curated from https://developers.cloudflare.com/workers-ai/models/
# Last updated: 2026-02-22
#
# This file contains curated metadata for Cloudflare Workers AI models
# to enable accurate capability detection in the parser

# Task type to modality mapping
# Used by update.py to convert Cloudflare task types to schema modalities
task_to_modality:
  "Text Generation": "text-to-text"
  "Text-to-Image": "text-to-image"
  "Automatic Speech Recognition": "audio-to-text"
  "Text-to-Speech": "text-to-audio"
  "Text Embeddings": "text-to-embedding"
  "Image-to-Text": "image-to-text"
  "Translation": "text-to-text"
  "Text Classification": "text-to-text"
  "Summarization": "text-to-text"
  "Object Detection": "image-to-text"
  "Image Classification": "image-to-text"
  "Voice Activity Detection": "audio-to-text"

# Vision/Multimodal models that support image input
# These models have both text-to-text and image-to-text modalities
vision_models:
  - "@cf/meta/llama-3.2-11b-vision-instruct"
  - "@cf/meta/llama-4-scout-17b-16e-instruct"
  - "@cf/llava-hf/llava-1.5-7b-hf"
  - "@cf/unum/uform-gen2-qwen-500m"
  - "@cf/google/gemma-3-12b-it"  # Gemma 3 is multimodal

# Models that support function/tool calling
function_calling_models:
  - "@cf/meta/llama-4-scout-17b-16e-instruct"
  - "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
  - "@cf/zai-org/glm-4.7-flash"
  - "@cf/qwen/qwen3-30b-a3b-fp8"
  - "@cf/mistralai/mistral-small-3.1-24b-instruct"
  - "@cf/nousresearch/hermes-2-pro-mistral-7b"

# Context window overrides (tokens)
# Default is 8192 for most models
context_windows:
  # Large context models
  "@cf/zai-org/glm-4.7-flash": 131072
  "@cf/qwen/qwq-32b": 131072
  "@cf/qwen/qwen2.5-coder-32b-instruct": 131072
  "@cf/google/gemma-3-12b-it": 128000
  "@cf/mistralai/mistral-small-3.1-24b-instruct": 128000
  "@cf/mistralai/mistral-7b-instruct-v0.2": 32768
  
  # Standard Llama 3.x models - 128K
  "@cf/meta/llama-3.1-8b-instruct": 131072
  "@cf/meta/llama-3.1-8b-instruct-fp8": 131072
  "@cf/meta/llama-3.1-8b-instruct-awq": 131072
  "@cf/meta/llama-3.1-8b-instruct-fast": 131072
  "@cf/meta/llama-3.1-70b-instruct": 131072
  "@cf/meta/llama-3.1-70b-instruct-fp8-fast": 131072
  "@cf/meta/llama-3.2-1b-instruct": 131072
  "@cf/meta/llama-3.2-3b-instruct": 131072
  "@cf/meta/llama-3.2-11b-vision-instruct": 131072
  "@cf/meta/llama-3.3-70b-instruct-fp8-fast": 131072
  
  # Llama 4
  "@cf/meta/llama-4-scout-17b-16e-instruct": 131072
  
  # Older models with smaller context
  "@cf/meta/llama-2-7b-chat-fp16": 4096
  "@cf/meta/llama-2-7b-chat-int8": 4096
  "@cf/meta/llama-3-8b-instruct": 8192
  "@cf/meta/llama-3-8b-instruct-awq": 8192
  "@cf/meta/meta-llama-3-8b-instruct": 8192
  
  # DeepSeek
  "@cf/deepseek-ai/deepseek-r1-distill-qwen-32b": 131072
  "@cf/thebloke/deepseek-coder-6.7b-instruct-awq": 16384
  "@cf/thebloke/deepseek-coder-6.7b-base-awq": 16384
  "@cf/deepseek/deepseek-math-7b-instruct": 4096
  
  # OpenAI GPT-OSS
  "@cf/openai/gpt-oss-120b": 131072
  "@cf/openai/gpt-oss-20b": 131072
  
  # IBM Granite
  "@cf/ibm-granite/granite-4.0-h-micro": 131072

