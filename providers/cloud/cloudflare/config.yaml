    upstream: "@cf/baai/bge-base-en-v1.5"
    free: true
    modalities:
      - text-to-embedding
    contextWindow: 8192
    maxOutputTokens: 4096
    capabilities:
      streaming: false
      tools: false
      vision: false
      json: false

