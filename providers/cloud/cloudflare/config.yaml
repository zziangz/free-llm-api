$id: "cloudflare"
name: "Cloudflare Workers AI"
description: "Cloudflare Workers AI - Run AI models at the edge with 10,000 free neurons/day"
url: "https://ai.cloudflare.com"
docs: "https://developers.cloudflare.com/workers-ai/"

# Protocol adapter for OpenAI compatibility
# See protocol.yaml for translation spec, adapter.py for implementation
protocolSpec: "./protocol.yaml"

auth:
  type: "bearer"
  keyLabel: "Cloudflare API Token"
  keyUrl: "https://dash.cloudflare.com/profile/api-tokens"

# Native Cloudflare API (not OpenAI-compatible)
# Use adapter.py for OpenAI SDK compatibility
endpoint:
  baseUrl: "https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/ai/run"
  protocol: "custom"
  protocolAdapter: "./adapter.py"

# Cloudflare uses "neurons" as the billing unit
# Free tier: 10,000 neurons/day. Cost per request varies by model.
limits:
  neurons:
    perDay: 10000
    description: "Free tier: 10,000 neurons per day (cost varies by model)"

