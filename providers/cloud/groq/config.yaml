$id: groq
name: Groq
description: Ultra-fast inference with LPU (Language Processing Unit) technology
url: https://groq.com
docs: https://console.groq.com/docs
auth:
  type: bearer
  keyLabel: Groq API Key
  keyUrl: https://console.groq.com/keys
  keyPrefix: gsk_
endpoint:
  baseUrl: https://api.groq.com/openai/v1
  protocol: openai
