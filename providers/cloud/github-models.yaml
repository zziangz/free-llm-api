$id: "github-models"
name: "GitHub Models"
description: "Free tier for GitHub users with access to popular models"
url: "https://github.com/marketplace/models"
docs: "https://docs.github.com/en/github-models"

auth:
  type: "bearer"
  keyLabel: "GitHub Personal Access Token"
  keyUrl: "https://github.com/settings/personal-access-tokens/new"
  keyPrefix: "ghp_"

endpoint:
  baseUrl: "https://models.inference.ai.azure.com"
  protocol: "openai"

limits:
  requestsPerMinute: 60
  tokensPerDay: 100000
  concurrent: 5

models:
  - id: "gpt-4o-mini"
    upstream: "gpt-4o-mini"
    free: true
    modalities:
      - text-to-text
      - text-image-to-text
    contextWindow: 128000
    maxOutputTokens: 16384
    capabilities:
      streaming: true
      tools: true
      vision: true
      json: true

  - id: "gpt-4o"
    upstream: "gpt-4o"
    free: true
    modalities:
      - text-to-text
      - text-image-to-text
    contextWindow: 128000
    maxOutputTokens: 16384
    capabilities:
      streaming: true
      tools: true
      vision: true
      json: true

  - id: "llama-3.3-70b-instruct"
    upstream: "meta-llama-3.3-70b-instruct"
    free: true
    modalities:
      - text-to-text
    contextWindow: 131072
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

  - id: "llama-3.1-8b-instruct"
    upstream: "meta-llama-3.1-8b-instruct"
    free: true
    modalities:
      - text-to-text
    contextWindow: 131072
    maxOutputTokens: 8192
    capabilities:
      streaming: true
      tools: true
      vision: false
      json: true

status: "active"
env: "GITHUB_PERSONAL_TOKEN"
tags:
  - free
  - rate-limited
  - official
